<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1450" viewBox="0 0 2000 1450">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .label { font: 700 24px "DejaVu Sans", Arial, sans-serif; fill: #0f172a; }
      .node-text { font: 17px "DejaVu Sans", Arial, sans-serif; fill: #0f172a; }
      .small-text { font: 15px "DejaVu Sans", Arial, sans-serif; fill: #334155; }
      .edge-label { font: 14px "DejaVu Sans", Arial, sans-serif; fill: #334155; }
      .boundary { fill: none; stroke: #cbd5e1; stroke-width: 3; stroke-dasharray: 9 9; rx: 8; }
      .core-boundary { fill: #f1f5f9; stroke: #334155; stroke-width: 3; rx: 8; }
      .hardware { fill: #e2e8f0; stroke: #64748b; stroke-width: 3; rx: 8; }
      .core { fill: #f1f5f9; stroke: #334155; stroke-width: 3; rx: 8; }
      .bridge { fill: #fefce8; stroke: #ca8a04; stroke-width: 3; rx: 8; }
      .xserver { fill: #fef2f2; stroke: #b91c1c; stroke-width: 3; rx: 8; }
      .client { fill: #ffffff; stroke: #94a3b8; stroke-width: 3; rx: 8; }
      .edge { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .edge-both { fill: none; stroke: #334155; stroke-width: 3; marker-start: url(#arrow); marker-end: url(#arrow); }
      .dash-edge { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 8; marker-end: url(#arrow-dashed); }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="2000" height="1450"/>

  <!-- LINUX KERNEL -->
  <rect class="boundary" x="170" y="35" width="1660" height="160"/>
  <text class="label" x="1000" y="75" text-anchor="middle">LINUX KERNEL (DRM/KMS)</text>
  <rect class="hardware" x="360" y="105" width="460" height="62"/>
  <text class="node-text" x="590" y="132" text-anchor="middle">⌨️ 🖱️ Physical Input Devices</text>
  <text class="small-text" x="590" y="154" text-anchor="middle">(Keyboard / Mouse)</text>
  <rect class="hardware" x="1180" y="105" width="460" height="62"/>
  <text class="node-text" x="1410" y="132" text-anchor="middle">🖥️ Display Output</text>
  <text class="small-text" x="1410" y="154" text-anchor="middle">(GPU Scanout)</text>

  <!-- SOPHIA ENGINE -->
  <rect class="core-boundary" x="150" y="260" width="1700" height="180"/>
  <text class="label" x="1000" y="302" text-anchor="middle">SOPHIA ENGINE (Compositor-First Input &amp; Render Hub)</text>
  <rect class="core" x="270" y="340" width="380" height="64"/>
  <text class="node-text" x="460" y="365" text-anchor="middle">Scene Graph</text>
  <text class="small-text" x="460" y="388" text-anchor="middle">Management</text>
  <rect class="core" x="810" y="340" width="380" height="64"/>
  <text class="node-text" x="1000" y="365" text-anchor="middle">Spatial Index</text>
  <text class="small-text" x="1000" y="388" text-anchor="middle">(GPU Hit-Testing &amp; Transforms)</text>
  <rect class="core" x="1350" y="340" width="380" height="64"/>
  <text class="node-text" x="1540" y="365" text-anchor="middle">Frame-Perfect Rendering</text>
  <text class="small-text" x="1540" y="388" text-anchor="middle">(Layout Epoch Waits)</text>

  <!-- POLICY -->
  <rect class="core-boundary" x="270" y="510" width="1460" height="160"/>
  <text class="label" x="1000" y="552" text-anchor="middle">DECOUPLED POLICY (Namespace-Blind)</text>
  <rect class="core" x="390" y="590" width="530" height="58"/>
  <text class="node-text" x="655" y="612" text-anchor="middle">Sophia WM</text>
  <text class="small-text" x="655" y="634" text-anchor="middle">(Niri-style Layout Logic via Opaque Handles)</text>
  <rect class="core" x="1080" y="590" width="530" height="58"/>
  <text class="node-text" x="1345" y="612" text-anchor="middle">Sophia Portals</text>
  <text class="small-text" x="1345" y="634" text-anchor="middle">(Explicit Cross-Namespace Policy)</text>

  <!-- X11 STACK -->
  <rect class="boundary" x="410" y="735" width="1180" height="300"/>
  <text class="label" x="1000" y="777" text-anchor="middle">X11 TRANSLATION &amp; LEGACY AUTHORITY</text>
  <rect class="bridge" x="715" y="815" width="570" height="58"/>
  <text class="node-text" x="1000" y="837" text-anchor="middle">Sophia X Bridge</text>
  <text class="small-text" x="1000" y="859" text-anchor="middle">(XComposite, Damage, Routed Input Adapter)</text>
  <rect class="bridge" x="715" y="895" width="570" height="58"/>
  <text class="node-text" x="1000" y="917" text-anchor="middle">Metadata Broker</text>
  <text class="small-text" x="1000" y="939" text-anchor="middle">(Sanitized Chrome &amp; Decor)</text>
  <rect class="xserver" x="715" y="975" width="570" height="58"/>
  <text class="node-text" x="1000" y="997" text-anchor="middle">Modified XServer (XLibre)</text>
  <text class="small-text" x="1000" y="1019" text-anchor="middle">XNamespaces Registry (XID Virtualization)</text>

  <!-- NAMESPACES -->
  <rect class="boundary" x="180" y="1085" width="1640" height="320"/>
  <text class="label" x="1000" y="1127" text-anchor="middle">ISOLATED CLIENT APPLICATIONS (XNamespaces)</text>
  <rect class="boundary" x="290" y="1165" width="620" height="190"/>
  <text class="label" x="600" y="1203" text-anchor="middle">NAMESPACE A (System Apps)</text>
  <rect class="client" x="390" y="1240" width="420" height="48"/>
  <text class="node-text" x="600" y="1270" text-anchor="middle">Terminal (Zellij / Helix)</text>
  <rect class="client" x="450" y="1315" width="300" height="48"/>
  <text class="node-text" x="600" y="1345" text-anchor="middle">File Manager</text>
  <rect class="boundary" x="1090" y="1165" width="620" height="190"/>
  <text class="label" x="1400" y="1203" text-anchor="middle">NAMESPACE B (Untrusted)</text>
  <rect class="client" x="1190" y="1240" width="420" height="48"/>
  <text class="node-text" x="1400" y="1270" text-anchor="middle">Web Browser (Chromium fork)</text>
  <rect class="client" x="1250" y="1315" width="300" height="48"/>
  <text class="node-text" x="1400" y="1345" text-anchor="middle">Web App (Zoom)</text>

  <!-- INPUT AND RENDER FLOWS -->
  <path class="edge" d="M 590 167 L 590 210 L 1000 210 L 1000 340"/>
  <text class="edge-label" x="770" y="202" text-anchor="middle">1. Raw libinput Events</text>
  <path class="edge" d="M 1000 404 L 1000 735 L 1000 815"/>
  <text class="edge-label" x="1135" y="706" text-anchor="middle">2. Target XID + Local Coords</text>
  <text class="edge-label" x="1135" y="724" text-anchor="middle">(Routed Input)</text>
  <path class="edge" d="M 1000 873 L 1000 975"/>
  <text class="edge-label" x="1178" y="968" text-anchor="middle">Privileged Event Injection</text>
  <path class="edge-both" d="M 870 1033 L 730 1165"/>
  <text class="edge-label" x="705" y="1075" text-anchor="middle">Strictly Sandboxed X11 Protocol</text>
  <path class="edge-both" d="M 1130 1033 L 1270 1165"/>
  <text class="edge-label" x="1305" y="1075" text-anchor="middle">Strictly Sandboxed X11 Protocol</text>
  <path class="edge" d="M 600 1165 L 600 1060 L 715 844"/>
  <text class="edge-label" x="555" y="1055" text-anchor="middle">3. XComposite Pixmaps</text>
  <path class="edge" d="M 1400 1165 L 1400 1060 L 1285 844"/>
  <text class="edge-label" x="1445" y="1055" text-anchor="middle">3. XComposite Pixmaps</text>
  <path class="edge" d="M 1285 844 L 1540 844 L 1540 404"/>
  <text class="edge-label" x="1545" y="685" text-anchor="start">Damage Regions &amp; Buffers</text>
  <path class="edge" d="M 1540 340 L 1540 225 L 1410 225 L 1410 167"/>
  <text class="edge-label" x="1578" y="220" text-anchor="middle">Final Scanout</text>

  <!-- POLICY FLOWS -->
  <path class="edge" d="M 460 340 L 460 625 L 390 625"/>
  <text class="edge-label" x="500" y="488" text-anchor="middle">Opaque Focus &amp; Layout Nodes</text>
  <path class="edge" d="M 920 619 L 1540 619 L 1540 404"/>
  <text class="edge-label" x="1270" y="611" text-anchor="middle">Atomic Layout Updates</text>

  <!-- METADATA AND PORTAL FLOWS -->
  <path class="dash-edge" d="M 1000 873 L 1000 895"/>
  <text class="edge-label" x="1165" y="893" text-anchor="middle">Sanitized UI Metadata</text>
  <path class="dash-edge" d="M 715 924 L 460 924 L 460 404"/>
  <text class="edge-label" x="535" y="675" text-anchor="middle">Redacted Presentation Data</text>
  <path class="dash-edge" d="M 650 372 L 1345 372 L 1345 590"/>
  <text class="edge-label" x="1040" y="362" text-anchor="middle">Transfer Prompts (e.g. Copy/Paste)</text>
  <path class="dash-edge" d="M 1345 648 L 1345 700 L 460 700 L 460 404"/>
  <text class="edge-label" x="1040" y="692" text-anchor="middle">Allow / Deny / Handoff</text>
</svg>
